<!DOCTYPE html>
<html>
<head>
  <title>Happy Birthday ❤️</title>
  <style>
    body {
      text-align: center;
      font-family: Arial;
      background: linear-gradient(to right, pink, lightblue);
      color: white;
      padding-top: 100px;
    }
    h1 {
      font-size: 50px;
    }
    p {
      font-size: 20px;
    }
    button {
      padding: 10px 20px;
      font-size: 18px;
      border: none;
      border-radius: 10px;
      background: red;
      color: white;
    }
  </style>
</head>
<body>

<h1>Happy Birthday My Love 🎂❤️</h1>
<p>You are the best thing in my life 💕</p>

<button onclick="showMessage()">Click Me 🎁</button>

<p id="hiddenMessage" style="display:none;">
  I love you forever ❤️ Thanks for being in my life 😘
</p>

<script>
function showMessage() {
  document.getElementById("hiddenMessage").style.display = "block";
}
</script>

</body>
</html>
